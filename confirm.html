<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Doğrulanıyor — Marka Algı Analizi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f0e8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:8px;padding:48px 40px;max-width:440px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.06)}
.logo{font-family:'DM Serif Display',serif;font-size:18px;color:#0f0f0f;margin-bottom:32px}
.logo span{color:#c8410a}
.icon{font-size:48px;margin-bottom:16px}
h2{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:12px;color:#0f0f0f}
p{font-size:15px;color:#7a7060;line-height:1.7}
.spinner{width:40px;height:40px;border:3px solid #d4cfc4;border-top-color:#1e3a5f;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#c8410a;background:#c8410a10;padding:16px;border-radius:4px;font-size:14px;margin-top:16px}
.btn{display:inline-block;margin-top:24px;padding:13px 32px;background:#1e3a5f;color:#fff;border-radius:3px;text-decoration:none;font-size:15px;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="logo">marka <span>algı</span> analizi</div>
  <div id="loading">
    <div class="spinner"></div>
    <h2>Doğrulanıyor...</h2>
    <p>Mail adresiniz doğrulanıyor, lütfen bekleyin.</p>
  </div>
  <div id="error" style="display:none">
    <div class="icon">⚠️</div>
    <h2>Bir sorun oluştu</h2>
    <p id="error-msg"></p>
    <a href="./index.html" class="btn">Ana Sayfaya Dön</a>
  </div>
</div>

<script>
const API = 'https://web-production-f48f6.up.railway.app';

async function confirm() {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');
  const uid    = params.get('uid');

  if (!token || !uid) {
    showError('Geçersiz link. Lütfen maildeki butona tekrar tıklayın.');
    return;
  }

  try {
    const resp = await fetch(`${API}/demo/confirm`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, user_id: uid }),
    });
    const data = await resp.json();

    if (!resp.ok) {
      showError(data.error || 'Doğrulama başarısız.');
      return;
    }

    // Başarılı — wizard'a yönlendir
    window.location.href = `./wizard.html?uid=${uid}&confirmed=1`;

  } catch(e) {
    showError('Bağlantı hatası. Lütfen tekrar deneyin.');
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').style.display = 'block';
}

confirm();
</script>
</body>
</html>
