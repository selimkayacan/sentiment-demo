<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş — Marka Algı Analizi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0f0f;--paper:#f5f0e8;--accent:#c8410a;--accent2:#1e4d8c;--muted:#7a7060;--border:#d4cfc4;--white:#fff}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(200,65,10,.06) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(30,77,140,.06) 0%,transparent 50%);pointer-events:none}
.container{width:100%;max-width:420px;padding:24px;position:relative;z-index:1}
.logo{text-align:center;margin-bottom:40px}
.logo-text{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink)}
.logo-text span{color:var(--accent)}
.card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:40px 36px;box-shadow:0 8px 48px rgba(0,0,0,.07)}
.card-title{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:8px}
.card-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.tab-row{display:flex;margin-bottom:28px;border:1.5px solid var(--border);border-radius:4px;overflow:hidden}
.tab-btn{flex:1;padding:10px;font-family:inherit;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--muted);transition:all .2s}
.tab-btn.active{background:var(--ink);color:var(--paper)}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:3px;font-size:14px;font-family:inherit;color:var(--ink);background:var(--paper);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--accent2);background:var(--white)}
.field input::placeholder{color:#b0a898}
.btn{width:100%;padding:13px;margin-top:8px;background:var(--ink);color:var(--paper);border:none;border-radius:3px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover:not(:disabled){background:var(--accent);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:default;transform:none}
.error-msg{display:none;font-size:13px;color:#c8410a;margin-top:12px;padding:10px 12px;background:#c8410a10;border-radius:3px;border:1px solid #c8410a30}
.success-msg{display:none;font-size:13px;color:#166534;margin-top:12px;padding:10px 12px;background:#dcfce7;border-radius:3px;border:1px solid #86efac;line-height:1.6}
.back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--muted);text-decoration:none}
.back-link span{color:var(--accent2);font-weight:500}
.panel{display:none}
.panel.active{display:block}
</style>
</head>
<body>
<div class="container">
  <div class="logo"><div class="logo-text">marka <span>algı</span> analizi</div></div>
  <div class="card">

    <!-- ŞİFRE OLUŞTUR -->
    <div class="panel" id="panel-set-password">
      <div class="card-title">Şifrenizi oluşturun</div>
      <div class="card-sub">Demo hesabınız hazır. Şifrenizi belirleyin ve platforma girin.</div>
      <div class="field">
        <label>Yeni Şifre</label>
        <input type="password" id="new-pass" placeholder="En az 6 karakter" onkeydown="if(event.key==='Enter')doSetPassword()">
      </div>
      <div class="field">
        <label>Şifre Tekrar</label>
        <input type="password" id="new-pass2" placeholder="Şifrenizi tekrar girin" onkeydown="if(event.key==='Enter')doSetPassword()">
      </div>
      <button class="btn" id="set-btn" onclick="doSetPassword()">
        <span id="set-btn-text">Şifremi Kaydet ve Devam Et</span><span>→</span>
      </button>
      <div class="error-msg" id="set-error"></div>
    </div>

    <!-- GİRİŞ YAP -->
    <div class="panel" id="panel-login">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-btn-login" onclick="showTab('login')">Giriş Yap</button>
        <button class="tab-btn" id="tab-btn-forgot" onclick="showTab('forgot')">Şifremi Unuttum</button>
      </div>
      <div id="tab-login-content">
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="login-email" placeholder="ad@firma.com" autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="field">
          <label>Şifre</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn" id="login-btn" onclick="doLogin()">
          <span id="login-btn-text">Giriş Yap</span><span>→</span>
        </button>
        <div class="error-msg" id="login-error"></div>
      </div>
      <div id="tab-forgot-content" style="display:none">
        <div class="card-sub" style="margin-bottom:16px">Mail adresinizi girin, şifre sıfırlama linki gönderelim.</div>
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="forgot-email" placeholder="ad@firma.com" onkeydown="if(event.key==='Enter')doForgot()">
        </div>
        <button class="btn" id="forgot-btn" onclick="doForgot()">
          <span id="forgot-btn-text">Link Gönder</span><span>→</span>
        </button>
        <div class="error-msg" id="forgot-error"></div>
        <div class="success-msg" id="forgot-success"></div>
      </div>
    </div>

  </div>
  <a href="./index.html" class="back-link">Demo hesabı yok mu? <span>Başvur →</span></a>
</div>

<script>
const SUPABASE_URL      = 'https://escjdzsfxzwvshapzugb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzY2pkenNmeHp3dnNoYXB6dWdiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMDQzMzgsImV4cCI6MjA4OTg4MDMzOH0.ylywekAEhONMpx5RBCdZXafUna9jZcB19etFrEcRJe8';
const API_BASE = 'https://web-production-f48f6.up.railway.app';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const TOKEN  = params.get('token');
const UID    = params.get('uid');

window.addEventListener('DOMContentLoaded', async () => {
  if (TOKEN && UID) {
    showPanel('set-password');
  } else {
    const { data: { session } } = await sb.auth.getSession();
    if (session) { await redirectUser(session.user.email); return; }
    showPanel('login');
  }
});

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

function showTab(tab) {
  document.getElementById('tab-login-content').style.display  = tab === 'login'  ? 'block' : 'none';
  document.getElementById('tab-forgot-content').style.display = tab === 'forgot' ? 'block' : 'none';
  document.getElementById('tab-btn-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-btn-forgot').classList.toggle('active', tab === 'forgot');
}

async function redirectUser(email) {
  try {
    const resp = await fetch(`${API_BASE}/demo/status-by-email?email=${encodeURIComponent(email)}`);
    if (resp.ok) {
      const s = await resp.json();
      if (s.user_id) {
        localStorage.setItem('demo_uid', s.user_id);
        window.location.href = (s.brand_id && s.analyzed_count > 0)
          ? `./dashboard.html?uid=${s.user_id}`
          : `./wizard.html?uid=${s.user_id}`;
        return;
      }
    }
  } catch(e) {}
  window.location.href = './wizard.html';
}

async function doSetPassword() {
  const p1  = document.getElementById('new-pass').value;
  const p2  = document.getElementById('new-pass2').value;
  const btn = document.getElementById('set-btn');
  document.getElementById('set-error').style.display = 'none';

  if (!p1 || p1.length < 6) { showErr('set-error', 'Şifre en az 6 karakter olmalı'); return; }
  if (p1 !== p2)             { showErr('set-error', 'Şifreler eşleşmiyor'); return; }

  btn.disabled = true;
  document.getElementById('set-btn-text').textContent = 'Kaydediliyor...';

  try {
    const resp = await fetch(`${API_BASE}/demo/set-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: TOKEN, uid: UID, password: p1 }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showErr('set-error', data.error || 'Hata oluştu');
      btn.disabled = false;
      document.getElementById('set-btn-text').textContent = 'Şifremi Kaydet ve Devam Et';
      return;
    }

    // Supabase ile giriş yap
    const { data: authData, error } = await sb.auth.signInWithPassword({
      email: data.email,
      password: p1,
    });

    if (error || !authData?.user) {
      // Supabase girişi başarısız — uid ile direkt yönlendir
      localStorage.setItem('demo_uid', data.user_id);
      window.location.href = `./wizard.html?uid=${data.user_id}`;
      return;
    }

    await redirectUser(authData.user.email);
  } catch(e) {
    showErr('set-error', 'Bağlantı hatası, tekrar deneyin');
    btn.disabled = false;
    document.getElementById('set-btn-text').textContent = 'Şifremi Kaydet ve Devam Et';
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  document.getElementById('login-error').style.display = 'none';

  if (!email || !pass) { showErr('login-error', 'E-posta ve şifre zorunlu'); return; }

  btn.disabled = true;
  document.getElementById('login-btn-text').textContent = 'Giriş yapılıyor...';

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    await redirectUser(data.user.email);
  } catch(e) {
    let msg = e.message || 'Giriş başarısız';
    if (msg.includes('Invalid login')) msg = 'E-posta veya şifre hatalı';
    showErr('login-error', msg);
    btn.disabled = false;
    document.getElementById('login-btn-text').textContent = 'Giriş Yap';
  }
}

async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showErr('forgot-error', 'E-posta giriniz'); return; }
  const btn = document.getElementById('forgot-btn');
  btn.disabled = true;
  document.getElementById('forgot-btn-text').textContent = 'Gönderiliyor...';
  try {
    await fetch(`${API_BASE}/demo/forgot-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    document.getElementById('forgot-success').textContent = '✓ Şifre sıfırlama linki gönderildi.';
    document.getElementById('forgot-success').style.display = 'block';
    document.getElementById('forgot-error').style.display = 'none';
  } catch(e) {
    showErr('forgot-error', 'Hata oluştu');
  } finally {
    btn.disabled = false;
    document.getElementById('forgot-btn-text').textContent = 'Link Gönder';
  }
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
